name: iOS CI

# Builds the app and runs the XCTest suite on an iOS Simulator with code
# coverage enabled. The Xcode project is generated from source by
# scripts/generate_xcode_project.py, so CI regenerates it to guarantee the
# build graph matches the committed Swift files.
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Opt JavaScript actions into Node 24 to clear the Node 20 deprecation
# warnings on runners where it is not yet the default.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-test:
    name: Build & Test
    runs-on: macos-14
    env:
      PROJECT: cursorSpeedometer.xcodeproj
      SCHEME: cursorSpeedometer
      # Minimum app-target line coverage (percent). Set ~5 points below the
      # measured baseline (64.9%) to guard against regressions while leaving
      # slack for normal fluctuation. Ratchet up as test coverage grows.
      COVERAGE_MIN: "60"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode
        # Pin the toolchain for reproducible builds. Bump the version when you
        # want a newer Xcode (it must exist on the runner image).
        run: |
          sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer
          xcodebuild -version
          python3 --version

      - name: Generate Xcode project
        run: python3 scripts/generate_xcode_project.py

      - name: Select iOS Simulator
        id: sim
        run: |
          set -euo pipefail
          udid=$(xcrun simctl list devices available --json | python3 -c '
          import json, sys
          data = json.load(sys.stdin)["devices"]
          for runtime, devices in data.items():
              if "iOS" not in runtime:
                  continue
              for dev in devices:
                  if dev.get("isAvailable") and dev["name"].startswith("iPhone"):
                      print(dev["udid"])
                      raise SystemExit(0)
          raise SystemExit("No available iOS iPhone simulator found")
          ')
          echo "Selected simulator: $udid"
          echo "udid=$udid" >> "$GITHUB_OUTPUT"

      - name: Build & test
        run: |
          set -o pipefail
          xcodebuild test \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}" \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO

      - name: Coverage report
        if: always()
        run: |
          if [ -d TestResults.xcresult ]; then
            xcrun xccov view --report --json TestResults.xcresult > coverage.json
            python3 scripts/check_coverage.py coverage.json "$COVERAGE_MIN"
          else
            echo "No result bundle produced; skipping coverage."
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-results
          path: |
            TestResults.xcresult
            coverage.json
          if-no-files-found: ignore
          retention-days: 14

  lint:
    name: SwiftLint
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install SwiftLint
        run: |
          if ! command -v swiftlint >/dev/null 2>&1; then
            brew install swiftlint
          fi
          swiftlint version

      - name: SwiftLint
        # Runs non-strict, so style warnings surface as annotations without
        # failing the build; only error-severity violations fail. Add --strict
        # once the warning backlog is clean.
        run: swiftlint lint --reporter github-actions-logging
